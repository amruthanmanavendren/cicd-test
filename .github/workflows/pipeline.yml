name: E-Commerce CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-scan-deploy:
    runs-on: ubuntu-latest

    env:
      IMAGE_NAME: amruthanm333/ecommerce-app
      IMAGE_TAG: latest
      

    steps:

      # 1. Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. OWASP Dependency Scan
      - name: OWASP Scan
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: "ecommerce-app"
          path: "."
          format: "HTML"

      # 3. Build Docker Image
      - name: Build Docker Image
        run: docker build --no-cache -t $IMAGE_NAME:$IMAGE_TAG .

      # 4. Trivy Scan
      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: 0

      # 5. Login to DockerHub
      - name: Docker Login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Push Image
      - name: Push Image
        run: docker push $IMAGE_NAME:$IMAGE_TAG

      # 7. Deploy to AWS EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          envs: IMAGE_NAME,IMAGE_TAG
          script: |
            echo "Deploying $IMAGE_NAME:$IMAGE_TAG"
            sudo docker stop ecommerce || true
            sudo docker rm ecommerce || true
            sudo docker rmi $IMAGE_NAME:$IMAGE_TAG || true
            sudo docker pull $IMAGE_NAME:$IMAGE_TAG
            sudo docker run -d -p 80:80 --name ecommerce $IMAGE_NAME:$IMAGE_TAG